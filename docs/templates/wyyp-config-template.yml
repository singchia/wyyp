# .wyyp.yml — 放在项目根目录,/wyyp 会读取。没有也能跑(全部走默认)。
version: 1

# ─── 权重(默认合计 100)─────────────────────────────────
# /wyyp 按这些权重加权打分。改动后仍需合计 100。
weights:
  unit: 20
  integration: 15
  regression: 20
  benchmark: 10
  compatibility: 10
  chaos: 5
  security: 20

# ─── 等级门槛 ──────────────────────────────────────────
# 默认:A+ ≥ 95,A ≥ 85,B ≥ 70,C ≥ 60,< 60 为 F
grade:
  A_plus: 95
  A:      85
  B:      70
  C:      60

# ─── 显式声明 N/A 的维度 ────────────────────────────────
# 这里声明的维度比 agent 自动判定更权威 —— agent 不再猜"应该有"
# 权重会归一化到其他维度(合计仍为 100)
skip:
  # chaos: "MVP 阶段无演练环境"
  # compatibility: "单平台 linux/amd64"

# ─── 单元 / 集成 ────────────────────────────────────────
coverage:
  min: 70                         # 覆盖率门槛,默认 70%
  # scope: [biz, data]            # 只统计这些目录

# ─── 基准 ──────────────────────────────────────────────
benchmark:
  baseline: .wyyp/bench-baseline.txt
  regression_threshold: 0.10      # 10% 劣化阻塞
  count: 5                        # go test -count 值

# ─── 回归 ──────────────────────────────────────────────
regression:
  # 核心白名单,任一失败 → 扣满权重
  critical:
    # - path: tests/regression/checkout_test.go
    #   reason: "支付主流程,2024 年事故"
  standard_tag: "@regression"
  standard_dir: tests/regression/

# ─── 安全 ──────────────────────────────────────────────
security:
  severity_block: [HIGH, CRITICAL]
  severity_warn:  [MEDIUM]
  allowlist:
    # - id: CVE-2024-99999
    #   reason: "upstream 未修,未调用到受影响函数"
    #   until: 2026-06-01          # 到期必须复查

# ─── 兼容性矩阵 ────────────────────────────────────────
compatibility:
  # go: ["1.22", "1.24"]
  # os: [linux, darwin]
  # arch: [amd64, arm64]

# ─── 混沌(默认告警不阻塞)─────────────────────────────
chaos:
  default_warn_only: true
  # block_on: [db_latency]

# ─── 命令覆写(极少用)────────────────────────────────
# commands:
#   unit: "make test-unit"
#   integration: "make test-integration"
#   regression: "make test-regression"
#   bench: "make bench"
#   security: "make lint vuln secscan"
