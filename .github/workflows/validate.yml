name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate SKILL.md + routing + self-check (strict)
        run: python3 scripts/validate-skill.py --strict .

      - name: Smoke test build
        run: |
          bash scripts/build-skill.sh /tmp/dist
          test -f /tmp/dist/wyyp.skill

      - name: Smoke test install.sh in clean dir
        run: |
          mkdir -p /tmp/install-test
          cd /tmp/install-test
          SKILL_DIR=$GITHUB_WORKSPACE bash $GITHUB_WORKSPACE/scripts/install.sh
          test -f AGENTS.md
          test -f .cursor/rules/wyyp.mdc
          test -f .wyyp.yml
          # 0.4.0+ 不再装 ~/.claude/commands/wyyp.md
          test ! -f "$HOME/.claude/commands/wyyp.md" || (echo "legacy command 文件不应出现"; exit 1)
          head -5 .cursor/rules/wyyp.mdc | grep -q "^globs:"
          head -5 .cursor/rules/wyyp.mdc | grep -q "^alwaysApply:"

      - name: Smoke test uninstall.sh
        run: |
          cd /tmp/install-test
          KEEP_SKILL=1 bash $GITHUB_WORKSPACE/scripts/uninstall.sh
          test ! -f AGENTS.md
          test ! -f .cursor/rules/wyyp.mdc
